<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveCluster - Authorizing</title>
<style>
body{margin:0;background:#0a0a0a;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;text-align:center}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#c00;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:22px;margin:0 0 8px;letter-spacing:2px}
p{color:#888;margin:4px 0;font-size:13px}
</style>
</head>
<body>
<div class="spinner" id="sp"></div>
<h1 id="st">DRIVECLUSTER</h1>
<p id="ms">인증을 처리 중입니다...</p>
<script>
(function(){
  function gp(n){var m=location.search.match(new RegExp('[?&]'+n+'=([^&]+)'));return m?decodeURIComponent(m[1]):null}
  var code=gp('code'),state=gp('state'),err=gp('error');
  var st=document.getElementById('st'),ms=document.getElementById('ms'),sp=document.getElementById('sp');
  if(err){sp.style.display='none';st.textContent='AUTHORIZATION FAILED';ms.textContent=err;return}
  if(code){sp.style.display='none';st.textContent='AUTHORIZED';ms.innerHTML='앱으로 돌아갑니다...';
    try{if(window.AndroidBridge&&window.AndroidBridge.onAuthCode)window.AndroidBridge.onAuthCode(code,state||'')}catch(e){}
    setTimeout(function(){location.href='drivecluster://callback?code='+encodeURIComponent(code)+'&state='+encodeURIComponent(state||'')},300);
    return
  }
  sp.style.display='none';st.textContent='DRIVECLUSTER CALLBACK';ms.textContent='이 페이지는 OAuth 콜백 전용입니다.';
})();
</script>
</body>
</html>
